# gitleaks config for CI secret scanning.
#
# main and master were history-scrubbed (git filter-repo): the source-
# separation notebooks and the credential-bearing test files were removed,
# so those branches scan clean on their own. The only remaining allowlist is
# the notebook path, kept so a PR opened from an OLD (un-rewritten) feature
# branch that still contains the notebook doesn't fail on its 946 base64
# output cells (false positives, not secrets). Real secrets — including the
# rotated GCP key still in stale branches — are NOT allowlisted: if one
# reaches a scanned ref, CI should flag it.
title = "blinc gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Jupyter notebook output cells (base64/tensor data ~ AWS-token regex)"
paths = [
  '''audio_processing/source_seperation/.*\.ipynb''',
  '''src/audio_processing/source_seperation/.*\.ipynb''',
]
