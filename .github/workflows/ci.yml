name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest numpy
      # Unit + contract tests: pure analytics, enrollment verdict logic,
      # voice-overlap math, posthoc-queue persistence, and source-level
      # producer/consumer contracts. No DB/GPU/network dependencies.
      - run: python -m pytest tests/ -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Lint gates on errors (rules-of-hooks — conditional-hook crashes) and
      # ratchets warnings. The backlog across .js AND .jsx is 276 (of which 65
      # are react-hooks/exhaustive-deps — the bug class behind three
      # production incidents this month); the cap lets none NEW in and must
      # only ever decrease. NOTE: --ext .js,.jsx is required — without it
      # eslint 8 silently skips every .jsx component.
      - run: npx eslint src --ext .js,.jsx --max-warnings 276
      - run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # The repo is public; block credentials before they land. We handle
      # real secrets (passwords, service-account keys) during ops, so this is
      # load-bearing, not decorative.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# E2E tests (tests/e2e/) exercise a live deployment with real credentials
# and are run manually — see the header of tests/e2e/join-record.spec.js.
# They stay out of CI: this repository is public, and no deployment secrets
# belong in it or its workflows. When wanted, run them from a self-hosted
# runner on the deployment host so secrets never leave the machine.
