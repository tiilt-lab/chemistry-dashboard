# Server block for the blinc.puthipiroj.com instance.
#
# NOTE: on glamdring-vm-1 the main /etc/nginx/nginx.conf does NOT include
# sites-enabled/, so either add this block inside the http {} context of
# /etc/nginx/nginx.conf, or add the line
#     include /etc/nginx/sites-enabled/*;
# to that http {} block and symlink this file:
#     sudo cp nginx-blinc.puthipiroj.com.conf /etc/nginx/sites-available/blinc.puthipiroj.com
#     sudo ln -s /etc/nginx/sites-available/blinc.puthipiroj.com /etc/nginx/sites-enabled/
#
# Start with plain HTTP (port 80); run certbot after DNS resolves to add TLS:
#     sudo certbot --nginx -d blinc.puthipiroj.com

server {
	listen 80;
	listen [::]:80;
	server_tokens off;
	include /etc/nginx/mime.types;
	include /etc/nginx/nginx-headers.conf;

	server_name blinc.puthipiroj.com;

	# Instance ports: Flask 5001, audio WS 9010, device WS 9011, video WS 9013.

	location / {
		alias /home/vlj9405/code/chemistry-dashboard/frontend/build/;
		try_files $uri$args $uri$args/ /index.html;
	}

	location /device_socket {
		proxy_pass http://127.0.0.1:9011;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
	}

	location /audio_socket {
		proxy_pass http://127.0.0.1:9010;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_read_timeout  300s;
		proxy_send_timeout  300s;
		proxy_connect_timeout 30s;
	}

	location /video_socket {
		proxy_pass http://127.0.0.1:9013;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
		proxy_read_timeout  300s;
		proxy_send_timeout  300s;
		proxy_connect_timeout 30s;
	}

	location /socket.io {
		include proxy_params;
		proxy_http_version 1.1;
		proxy_buffering off;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "Upgrade";
		proxy_set_header Host $host;
		proxy_pass http://127.0.0.1:5001/socket.io;
	}

	location /api {
		include proxy_params;
		proxy_pass http://127.0.0.1:5001;
	}

	location /ping {
		return 200 "pong\n";
	}
}
