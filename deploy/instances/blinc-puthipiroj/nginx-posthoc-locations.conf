# Post-hoc analysis websockets — add these location blocks inside the
# blinc.puthipiroj.com server block (alongside /audio_socket, /video_socket).
location /video_posthoc_socket {
    proxy_pass http://127.0.0.1:9014;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout  3600s;   # post-hoc runs can be long
    proxy_send_timeout  3600s;
}
location /audio_posthoc_socket {
    proxy_pass http://127.0.0.1:9015;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout  3600s;
    proxy_send_timeout  3600s;
}
